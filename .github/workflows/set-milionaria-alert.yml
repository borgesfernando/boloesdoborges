name: Atualizar alerta Milionária

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      ativo:
        description: 'Ativar alerta? (true/false)'
        required: true
        default: 'false'

permissions:
  contents: write

jobs:
  set-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ''

      - name: Atualizar milionaria-alert.json
        env:
          ALERTA_PROJETO: milionaria
          ALERTA_ATIVO: ${{ inputs.ativo }}
        run: node scripts/update-acumulados-alert.js

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/milionaria-alert.json)" ]; then
            git add data/milionaria-alert.json
            git commit -m "chore: atualizar alerta milionaria [skip ci]"
            git push
          else
            echo "Sem mudanças para sincronizar"
          fi
