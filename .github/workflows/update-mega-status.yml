name: Atualizar mega-status

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 09:00 UTC de segunda, quarta e sexta → 06:00 BRT (janela de chamada até 18h do mesmo dia)
    - cron: '0 9 * * 1,3,5'
    # 22:30 BRT (UTC-3) → 01:30 UTC do dia seguinte
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-mega-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ''  # garante que NÃO tentará cache de deps (evita exigir lockfile)

      - name: Executar script de atualização
        run: node scripts/update-mega-status.js

      - name: Verificar e enviar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/mega-status.json data/megasena-api.json)" ]; then
            echo "✅ Alterações detectadas nos arquivos de Mega-Sena"

            git add data/mega-status.json data/megasena-api.json
            git commit -m "chore: atualizar status e snapshot da Mega-Sena [skip ci]"

            echo "📤 Enviando alterações para o repositório..."
            git push
            echo "✅ Alterações enviadas com sucesso!"
          else
            echo "ℹ️ Nenhuma alteração encontrada em data/mega-status.json"
          fi
